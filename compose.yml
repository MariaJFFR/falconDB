      - ./DBdata/dn2s2:/app/DBdata
      - ./logs:/app/logs

  dn2s3:
    image: falcondb:latest
    network_mode: host
    command: node src/dataNode/dn2s3/server.js
    volumes:
      - ./DBdata/dn2s3:/app/DBdata
      - ./logs:/app/logs
