services:
  rp:
    container_name: rp
    image: falcondb:latest
    restart: unless-stopped
    ports:
      - "8000:8000"
    command: node src/reverseProxy/server.js
    volumes:
      - ./logs:/app/logs

  dn0s1:
    container_name: dn0s1
    image: falcondb:latest
    restart: unless-stopped
    command: node src/dataNode/dn0s1/server.js
    depends_on:
      - rp
    volumes:
      - ./DBdata/dn0s1:/app/DBdata
      - ./logs:/app/logs

  dn0s2:
    container_name: dn0s2
    image: falcondb:latest
    restart: unless-stopped
    command: node src/dataNode/dn0s2/server.js
