    image: falcondb:latest
    restart: unless-stopped
    command: node src/dataNode/dn0s3/server.js
    depends_on:
      - rp
    volumes:
      - ./DBdata/dn0s3:/app/DBdata
      - ./logs:/app/logs

  dn1s1:
